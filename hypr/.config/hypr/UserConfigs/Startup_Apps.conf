# Autostart — JaKooLit sources this after their own exec-once block

# Status bar
exec-once = waybar

# Notification daemon
exec-once = mako

# Idle/lock daemon (drives Hyprlock on idle/suspend)
exec-once = hypridle

# Wallpaper daemon
exec-once = swww-daemon

# Auth agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# JARVIS boot sequence (staggered notifications)
exec-once = bash ~/.config/hypr/scripts/boot-sequence.sh

# Clipboard manager (if installed)
# exec-once = wl-paste --watch cliphist store
