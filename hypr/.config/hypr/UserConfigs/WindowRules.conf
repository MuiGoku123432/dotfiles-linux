# Window rules

# Float common dialogs
windowrulev2 = float, class:^(org.gnome.Nautilus)$, title:^(Open Files)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(org.freedesktop.impl.portal.desktop.gtk)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

# Ghostty: no decoration (handled by ghostty itself)
windowrulev2 = nodim, class:^(com.mitchellh.ghostty)$

# Wofi: float and center
windowrulev2 = float,  class:^(wofi)$
windowrulev2 = center, class:^(wofi)$
windowrulev2 = noborder, class:^(wofi)$

# Mako: ignore (it manages itself)
windowrulev2 = float, class:^(mako)$
