# JARVIS theme — gaps, borders, animations
# Sourced by JaKooLit after their defaults; settings here win.

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(00d4ffee) rgba(0066aaee) 45deg
    col.inactive_border = rgba(005566aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        xray = false
    }
    drop_shadow = true
    shadow_range = 12
    shadow_render_power = 3
    col.shadow = rgba(00d4ff22)
    active_opacity = 1.0
    inactive_opacity = 0.95
}

animations {
    enabled = true
    bezier = jarvis, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, jarvis, slide
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 6, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, jarvis, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}
