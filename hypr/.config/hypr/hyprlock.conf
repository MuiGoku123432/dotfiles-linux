# JARVIS-style Hyprlock — minimal HUD aesthetic
# Fonts: Orbitron (clock) + Rajdhani (subtitles) — install via scripts/install-fonts.sh

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/jarvis-lock.png
    blur_passes = 3
    blur_size = 8
    contrast = 1.2
    brightness = 0.4
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# Top-left HUD: hostname/status
label {
    monitor =
    text = cmd[update:5000] echo "[ STARK-MK1 // ONLINE ]"
    color = rgba(00d4ffff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = 40, -40
    halign = left
    valign = top
}

# Top-right HUD: date/time
label {
    monitor =
    text = cmd[update:1000] date "+%H:%M:%S // %Y.%m.%d"
    color = rgba(00d4ffff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = -40, -40
    halign = right
    valign = top
}

# Center: large clock
label {
    monitor =
    text = cmd[update:1000] date "+%H:%M"
    color = rgba(c0e8f0ff)
    font_size = 120
    font_family = Orbitron Bold
    position = 0, 80
    halign = center
    valign = center
}

# Sub-clock
label {
    monitor =
    text = cmd[update:60000] date "+%A, %B %d"
    color = rgba(80deeacc)
    font_size = 18
    font_family = Rajdhani Medium
    position = 0, 0
    halign = center
    valign = center
}

# User identity
label {
    monitor =
    text = USER: $USER
    color = rgba(415a77ff)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(00d4ffff)
    inner_color = rgba(0a0e1ad9)
    font_color = rgba(c0e8f0ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##415A77">// AUTHENTICATE</span>
    hide_input = false
    rounding = 0
    check_color = rgba(ffb300ff)
    fail_color = rgba(ff3333ff)
    fail_text = <span foreground="##FF3333">// ACCESS DENIED</span>
    capslock_color = rgba(ffb300ff)
    position = 0, -160
    halign = center
    valign = center
}

# Bottom-left HUD: kernel
label {
    monitor =
    text = cmd[update:5000] echo "[ KERNEL: $(uname -r) ]"
    color = rgba(415a77ff)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 40, 40
    halign = left
    valign = bottom
}

# Bottom-right HUD: uptime
label {
    monitor =
    text = cmd[update:30000] echo "[ UPTIME: $(uptime -p | sed 's/up //') ]"
    color = rgba(415a77ff)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
}

# Bottom-center: tagline
label {
    monitor =
    text = J.A.R.V.I.S. INTERFACE v3.0
    color = rgba(00d4ff99)
    font_size = 10
    font_family = Rajdhani Medium
    position = 0, 40
    halign = center
    valign = bottom
}
